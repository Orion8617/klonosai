name: Deploy API → Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
  workflow_dispatch:

env:
  REGISTRY: klonosai.azurecr.io
  IMAGE:    klonosai.azurecr.io/api-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy API Server

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        env:
          NODE_ENV: production

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name klonosai

      - name: Build & push Docker image
        run: |
          docker build \
            -f artifacts/api-server/Dockerfile \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup:    klonosai-rg
          containerAppName: klonosai-api
          imageToDeploy:    ${{ env.IMAGE }}:${{ github.sha }}
