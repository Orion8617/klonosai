kind = "web"
previewPath = "/klonos-ext/"
title = "KlonOS Chrome Extension"
version = "1.0.0"
id = "artifacts/klonos-ext"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/klonos-ext/" ]
localPort = 18986

[services.development]
run = "pnpm --filter @workspace/klonos-ext run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/klonos-ext", "run", "build" ]
publicDir = "artifacts/klonos-ext/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18986"
BASE_PATH = "/klonos-ext/"
