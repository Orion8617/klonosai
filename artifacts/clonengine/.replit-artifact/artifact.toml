kind = "web"
previewPath = "/clonengine/"
title = "ClonEngine — Neuromorphic Intelligence"
version = "1.0.0"
id = "artifacts/clonengine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/clonengine/" ]
localPort = 25308

[services.development]
run = "pnpm --filter @workspace/clonengine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clonengine", "run", "build" ]
publicDir = "artifacts/clonengine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25308"
BASE_PATH = "/clonengine/"
