    <line x1="150" y1="50" x2="150" y2="68" stroke-width=".55"/>
    <line x1="164" y1="50" x2="164" y2="68" stroke-width=".55"/>
    <line x1="178" y1="50" x2="178" y2="68" stroke-width=".55"/>
    <line x1="192" y1="50" x2="192" y2="68" stroke-width=".55"/>
    <line x1="206" y1="50" x2="206" y2="68" stroke-width=".55"/>
